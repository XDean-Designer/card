<script type="application/json" id="docs-bundle">{"README.md":"# 研发最小可开工包 · 会员卡权益组合版\n\n> **在线 / 演示请打开 [`index.html`](./index.html)**（左侧切换各文档）。GitHub Pages 无法把 `.md` 渲染成可导航站点，`.md` 仅作源文件维护。\n\n面向前后端联调与估点的**最小文档集**。业务范围以产品 PRD 为准；规则以实现说明书 + 算例为准；原型仅作交互参考。\n\n| 文档 | 用途 | 主读者 | 浏览 |\n|------|------|--------|------|\n| [00-scope.md](./00-scope.md) | 本期做 / 不做 | 全员 | [在站点中打开](#00-scope) |\n| [01-data-model.md](./01-data-model.md) | 实体、字段、状态、快照 | 后端为主 | [在站点中打开](#01-data-model) |\n| [02-api-catalog.md](./02-api-catalog.md) | 接口目录与请求/响应草案 | 前后端 | [在站点中打开](#02-api-catalog) |\n| [03-rules-cases.md](./03-rules-cases.md) | 延期/退卡公式与验收算例 | 后端 + QA | [在站点中打开](#03-rules-cases) |\n| [04-page-map.md](./04-page-map.md) | 原型页面 ↔ 能力 ↔ 接口 | 前端为主 | [在站点中打开](#04-page-map) |\n| [05-acceptance.md](./05-acceptance.md) | 本期 P0 验收清单 | QA + 产品 | [在站点中打开](#05-acceptance) |\n\n## 权威源优先级\n\n1. **范围**：`../PRD-会员卡-权益组合版.md`、`../prd-review.html`\n2. **规则**：本目录 `03-rules-cases.md` + `../logic.html` 算例；实现应对齐 `demo.html` 中 `computeSuggestedRefund*`\n3. **交互**：`../demo.html`（含价目等**非本期**演示，勿按原型扩 scope）\n\n## 在线入口\n\n- **开工包站点**：https://xdean-designer.github.io/card/docs/\n- 演示：https://xdean-designer.github.io/card/\n- 原型：https://xdean-designer.github.io/card/demo.html\n- 逻辑：https://xdean-designer.github.io/card/logic.html\n\n## 建议联调顺序\n\n1. 定稿：模板创建/详情字段 + `usagePolicy` 枚举  \n2. Mock：模板列表、办卡、退卡试算（先通 Sheet）  \n3. 退卡算例 A 单测通过后再接支付/核销真数据  \n4. 延期、上下架、锁定（`validCardCount`）  \n","00-scope.md":"# 00 · 范围一页纸（本期）\n\n| 项 | 内容 |\n|----|------|\n| 产品 | 剑琅联盟 · 会员卡 · 权益组合版 |\n| 端 | 商家端移动（对齐 390 原型） |\n| 主用户 | 店主 / 店长 / 前台 |\n| 当前排期 | **仅「会员卡创建与管理」** |\n| 对接（必须） | 既存会员选人、支付 / 退款 |\n| 依赖（不建设） | 项目挂牌价：既存源或占位；会员 CRUD：未启动 |\n\n---\n\n## 本期交付（P0）\n\n- 卡模板：列表（在售/已下架）、三步创建、详情、克隆、上下架  \n- 有持卡时模板规则锁定（`validCardCount > 0` 不可改 Step1–3）  \n- 权益组合：面值 / 项目 / 折扣  \n- 用卡策略：`refundRule` + `performanceRule`（存字段；**业绩不运算**）  \n- 办卡、延期、整卡退卡（双模式建议退 + 可改实退 + **审计日志**）  \n\n## 本期明确不做\n\n| 项 | 说明 |\n|----|------|\n| 项目管理（价目表 CRUD） | 后续另立；卡侧只读挂牌价 |\n| 会员管理 | 尚未启动；只消费既存选人接口 |\n| 劳动业绩 runtime | 只存 `performanceRule` |\n| 自建核销 UI | 消耗来自既存核销或账本 |\n| 部分退 | 产品决策：不支持 |\n| 适用对象 | 不做 |\n| 退卡手续费 / 超额审批 / 备注 | 不做（实退可改须审计） |\n| 顾客端预约联调 | 不做 |\n\n## P1（另排，非本期验收）\n\n- **补录老卡**：录入线下/存量持卡至**当前建卡体系**（非替换另一套旧产品）  \n- 必填原办卡日等细则见 PRD §6.8 / `logic.html` Q1  \n\n## 原型里有、本期勿排研发\n\n价目表增删改、置顶、字色图例、项目照片等 —— 演示用，**不等于本期 scope**。\n\n完整产品说明：[`../PRD-会员卡-权益组合版.md`](../PRD-会员卡-权益组合版.md)  \n评审投屏：[`../prd-review.html`](../prd-review.html)\n","01-data-model.md":"# 01 · 领域数据模型（草案）\n\n> 字段名对齐原型 `demo.html` 状态结构，落库时可改名，但语义需一一映射。  \n> `id` 建议 UUID；金额单位：**元**，保留 2 位小数。\n\n```text\nTemplate（卡模板）\n  ├─ benefits flags + 面值字段\n  ├─ projectItems[]          （项目权益）\n  ├─ memberPrices{}          （折扣权益）\n  └─ usagePolicy             （策略，办卡时快照到实例）\n\nCardInstance（持卡实例）\n  ├─ usagePolicySnapshot\n  ├─ catalogPriceSnapshot{}  （相关项目挂牌价）\n  ├─ cardExpireAt\n  ├─ paidAmount\n  └─ ledger                  （余额 / 次数 / 折扣已享）\n\nMember（外部）──办卡──▶ CardInstance\nPayment / Refund（外部）\nConsumption（既存核销）──汇总──▶ ledger used 字段\n```\n\n---\n\n## 1. Template（卡模板）\n\n| 字段 | 类型 | 必填 | 说明 |\n|------|------|------|------|\n| id | string | 是 | 模板 ID |\n| name | string | 是 | 卡名称 |\n| recharge / purchaseAmount | number | 是* | 购买金额（原型 `recharge`）；面值场景下亦为面值基准 |\n| giftAmount | number | 否 | 赠送面值；仅 `benefits.balance` |\n| cardColor | string | 否 | 卡面主题枚举，如 `brand_red` |\n| shelved | bool | 是 | true = 已下架，不可新办 |\n| createdAt | number/ISO | 是 | |\n| duplicatedFrom | string | 否 | 克隆来源模板 ID |\n| benefits.balance | bool | 是 | 是否含面值 |\n| benefits.timesOrValidity | bool | 是 | 是否含项目次数 |\n| benefits.projectDiscount | bool | 是 | 是否含折扣 |\n| projectItems | ProjectItem[] | 条件 | `timesOrValidity` 时至少 1 项 |\n| memberPrices | map | 条件 | key = 项目名或 `__ALL__`；`projectDiscount` 时必有 |\n| usagePolicy | UsagePolicy | 是 | 见下 |\n| cardValidity | Validity | 是 | 卡级有效期；仅约束项目/折扣；**默认永久** |\n| stats.validCardCount | int | 算 | **锁定关键**：>0 不可编辑规则字段 |\n\n\\* 无面值的纯项目/折扣卡仍有「购买金额」作为办卡实付。\n\n> **原型编辑态**：Step2 以 `projectBenefitCards[]` / `discountBenefitCards[]` 分组编辑（同次数或同折扣规则可绑多项目合成一张卡），保存时展开为 `projectItems` / `memberPrices`。落库以展开后字段为准。\n\n### ProjectItem\n\n| 字段 | 类型 | 说明 |\n|------|------|------|\n| id | string | 可选 |\n| name | string | 关联价目项目名 / ID（本期用既存挂牌价源） |\n| purchaseQty | int | 购买次数 |\n| giftQty | int | 赠送次数 |\n| unlimited | bool | 不限次；不参与退卡名义池项目权重 |\n\n### DiscountRule（memberPrices 的 value）\n\n| 字段 | 类型 | 说明 |\n|------|------|------|\n| mode | `discount` \\| `fixed` | 折扣档 / 固定会员价 |\n| tickIndex | 0–20 | 仅 discount；`20` = 原价；折后价 = 原价 × tickIndex/20 |\n| amount | number | 仅 fixed |\n\n`__ALL__`：批量「全部项目」同一规则（原型 `MP_BATCH_KEY`）。\n\n### UsagePolicy\n\n| 字段 | 枚举 | 默认 | 说明 |\n|------|------|------|------|\n| refundRule | `alloc_pool` \\| `retail` | `alloc_pool` | 退卡：界面「均值模式」/「减值模式」 |\n| performanceRule | `alloc_pool` \\| `retail` | `alloc_pool` | 业绩：界面「均值模式」/「原价模式」；**本期只存不运算** |\n\n> 枚举值两端相同；界面文案按轨区分（退卡 retail≠业绩 retail 的中文名）。原型 Step3 各选项附一行公式提示。\n\n### Validity（卡有效期）\n\n| 形态 | 说明 |\n|------|------|\n| permanent | 项目/折扣亦视为不设到期；**含不限次项目时不可为永久**（前端弹窗拦截，见 `04`） |\n| 日 / 月 / 年 | 办卡日写入 `cardExpireAt` |\n\n---\n\n## 2. CardInstance（持卡实例）\n\n| 字段 | 类型 | 说明 |\n|------|------|------|\n| id | string | 实例 ID |\n| templateId | string | 来源模板（可保留快照副本） |\n| memberId | string | 外部会员 ID |\n| paidAmount | number | 办卡实付 |\n| issuedAt | ISO | 办卡时间 |\n| cardExpireAt | date\\|null | 项目/折扣到期；永久为空 |\n| status | enum | `active` \\| `expired` \\| `refunded` |\n| usagePolicySnapshot | UsagePolicy | 办卡冻结 |\n| catalogPriceSnapshot | map name→price | 办卡时挂牌价；**改价不回溯** |\n| benefitSnapshot | object | 办卡时权益结构副本（防模板后改） |\n| ledger | Ledger | 见下 |\n\n### Ledger\n\n**balance**（可空）\n\n| 字段 | 说明 |\n|------|------|\n| rechargeRemaining / giftRemaining | 剩余充值面值 / 赠送 |\n| rechargeUsed / giftUsed | 已用（消费顺序：先充值后赠送） |\n\n**projects[name]**（次数卡项）\n\n| 字段 | 说明 |\n|------|------|\n| purchaseRemaining / giftRemaining | |\n| purchaseUsed / giftUsed | 先购买次后赠送次 |\n\n**discountUses[name]**  \n可为次数或明细；退卡折扣消耗用 **累计已享优惠** `savedTotal`（Σ 原价−折后）。账本需能汇总到 `savedTotal`。\n\n---\n\n## 3. 流水与审计\n\n| 实体 | 关键字段 | 说明 |\n|------|----------|------|\n| ExtensionOrder | instanceId, days/unit, feeAmount, fromExpire, toExpire | 延期；**不计入办卡总额/次数** |\n| RefundOrder | instanceId, suggestedAmount, actualAmount, lines[] | 整卡退 |\n| AuditLog | actor, action, before/after, at | 至少覆盖：改实际退款 |\n\n---\n\n## 4. 状态机（摘要）\n\n**模板**\n\n```text\n在售(shelved=false) ⇄ 已下架(shelved=true)\n编辑规则：仅当 validCardCount==0（及产品约定的无有效持卡）\n克隆：始终可 → 新模板 duplicatedFrom\n```\n\n**实例**\n\n```text\nactive --到期--> expired --延期--> active\nactive|expired --确认退卡--> refunded（权益清零）\n```\n\n---\n\n## 5. 外部依赖（只读/调用）\n\n| 系统 | 本期用法 |\n|------|----------|\n| 会员 | 搜索/选择 `memberId` |\n| 支付/退款 | 办卡收款；退卡打款 |\n| 价目/项目 | 名称 + 挂牌价（只读） |\n| 核销 | 汇总写入 ledger used；无则允许 Mock 账本 |\n\n字段级 DDL 可由后端按本表展开；评审时重点对齐：**快照、ledger、usagePolicy 枚举**。\n","02-api-catalog.md":"# 02 · 接口目录草案（本期 P0）\n\n> 路径、分页风格可按中台规范改；**字段语义**对齐 `01-data-model.md`。  \n> 鉴权、租户/门店 ID 按现有网关约定追加，本文从略。  \n> 状态码建议：`0` 成功；业务错误用明确 `code`（见文末）。\n\nBase（示例）：`/api/v1/member-cards`\n\n---\n\n## 1. 模板\n\n### `GET /templates`\n\n列表。Query：`shelf=active|shelved`、`keyword`、`page`。\n\n**Response item（摘要）**\n\n```json\n{\n  \"id\": \"tpl_xxx\",\n  \"name\": \"尊享组合卡\",\n  \"purchaseAmount\": 3980,\n  \"shelved\": false,\n  \"benefits\": { \"balance\": true, \"timesOrValidity\": true, \"projectDiscount\": true },\n  \"usagePolicy\": { \"refundRule\": \"alloc_pool\", \"performanceRule\": \"alloc_pool\" },\n  \"validCardCount\": 12,\n  \"editable\": false\n}\n```\n\n`editable = (validCardCount === 0)`。\n\n### `GET /templates/{id}`\n\n详情：完整 `projectItems`、`memberPrices`、`cardValidity`、`stats`。\n\n### `POST /templates`\n\n创建。Body = Template 可写字段（见数据模型）。校验：至少一类权益；策略必填。\n\n### `PUT /templates/{id}`\n\n更新。若 `validCardCount > 0` → **403** `TEMPLATE_LOCKED`。\n\n### `POST /templates/{id}/clone`\n\n克隆。返回新模板；`duplicatedFrom` = 源 id；不强制下架源模板。\n\n### `POST /templates/{id}/shelf`\n\nBody：`{ \"shelved\": true|false }`。下架后不可新办；已持卡仍可退/延。\n\n---\n\n## 2. 项目挂牌价（只读依赖）\n\n### `GET /catalog/projects`（或中台既有）\n\n本期**不实现**价目管理；办卡/选项目/退卡权重需要：\n\n```json\n{ \"name\": \"洗剪吹\", \"price\": 68, \"onSale\": true }\n```\n\n---\n\n## 3. 会员（既有）\n\n### `GET /members?keyword=`\n\n选人列表。返回 `id, name, phoneMasked` 即可。\n\n---\n\n## 4. 办卡\n\n### `POST /templates/{id}/issue`\n\n```json\n{\n  \"memberId\": \"m1\",\n  \"paidAmount\": 3980,\n  \"paymentChannel\": \"wechat\",\n  \"paymentPayload\": {}\n}\n```\n\n**行为要点**\n\n1. 模板未下架  \n2. 拉挂牌价写入 `catalogPriceSnapshot`  \n3. 写入 `usagePolicySnapshot`、`benefitSnapshot`  \n4. 初始化 `ledger`  \n5. 计算 `cardExpireAt`（非永久）  \n6. `validCardCount++`  \n\n**Response**：`CardInstance` 摘要 + 支付结果。\n\n---\n\n## 5. 持卡查询\n\n### `GET /templates/{id}/holders`\n\n在售办卡弹层「退卡/延期」Tab。返回会员、`status`、`cardExpireAt`、剩余摘要。\n\n### `GET /instances/{instanceId}`\n\n详情 + ledger（供退卡 Sheet）。\n\n---\n\n## 6. 延期\n\n### `POST /instances/{instanceId}/extend`\n\n```json\n{\n  \"unit\": \"month\",\n  \"value\": 3,\n  \"feeAmount\": 0\n}\n```\n\n`unit`: `day|month|year|permanent`。  \n\n规则摘要：仅改 `cardExpireAt`；含折扣权益时 `feeAmount` 可改（默认可按规则预填）；**独立流水，不计入办卡统计**；失效可复活。  \n永久卡：原型「退卡/延期」Tab **仍展示「延期」入口**，点击 toast「永久卡无需延期」；接口应 **400** `EXTEND_NOT_ALLOWED`。\n\n---\n\n## 7. 退卡\n\n### `POST /instances/{instanceId}/refund/preview`\n\n试算（只读，不落库）。\n\n**Response（对齐 Sheet）**\n\n```json\n{\n  \"refundRule\": \"alloc_pool\",\n  \"paidAmount\": 500,\n  \"consumedTotal\": 100,\n  \"suggestedRefund\": 400,\n  \"remainingDisplayTotal\": 400,\n  \"lines\": [\n    {\n      \"kind\": \"project\",\n      \"label\": \"洗剪吹\",\n      \"consumed\": 100,\n      \"remaining\": 400,\n      \"note\": \"均值 · 单次摊销 50 × 已用 2\"\n    }\n  ]\n}\n```\n\n说明：`suggestedRefund = max(0, paidAmount - consumedTotal)`；**不要用 remainingDisplayTotal 封顶**。\n\n### `POST /instances/{instanceId}/refund/confirm`\n\n```json\n{\n  \"actualRefund\": 400,\n  \"previewToken\": \"可选：与 preview 绑定防串改\"\n}\n```\n\n**行为**：打款；实例 → `refunded`；权益清零；`validCardCount--`；若 `actualRefund !== suggested` 写 **AuditLog**。\n\n本期：**不支持部分退**；无审批字段。\n\n---\n\n## 8. 错误码（建议）\n\n| code | 含义 |\n|------|------|\n| TEMPLATE_LOCKED | 有有效持卡，禁止改规则 |\n| TEMPLATE_SHELVED | 已下架不可办卡 |\n| EXTEND_NOT_ALLOWED | 永久卡等不可延期（UI 可展示入口，接口拒绝） |\n| REFUND_NOT_ALLOWED | 已退 / 状态非法 |\n| LEDGER_INCOMPLETE | 缺消耗数据（可配置拦截） |\n| CATALOG_PRICE_MISSING | 缺挂牌价无法建池/减值 |\n\n---\n\n## 9. Mock 建议\n\n1. 先实现 `preview` 与算例 A 对齐（见 `03-rules-cases.md`）  \n2. 办卡支付可用 sandbox  \n3. ledger 可用配置覆盖（对齐原型 `DEMO_HOLDER_LEDGER`）\n","03-rules-cases.md":"# 03 · 规则与验收算例（可执行）\n\n权威补充：`../logic.html`（Q1–Q4）。实现应对齐 `demo.html`：`buildRefundNominalPool`、`computeSuggestedRefundAllocPool`、`computeSuggestedRefundRetail`。\n\n界面文案可能简化；**验收与单测以本文 + 引擎为准**。\n\n---\n\n## 1. 有效期（Q1）\n\n| 规则 | 定稿 |\n|------|------|\n| 卡级 `cardExpireAt` | 仅约束 **项目、折扣** |\n| 面值 | **永久有效**，过期后仍可消费/参与退卡 |\n| 宽限 | **无**；到期日当日项目/折扣硬失效 |\n| 恢复 | 延期复活或重新办卡 |\n| 不限次 | 项目权益可选不限次；**卡级有效期不得为永久**（见 §2） |\n\n消费校验：面值不校验卡到期；项目/折扣须未过期。\n\n---\n\n## 2. 延期（Q2）\n\n| 项 | 规则 |\n|----|------|\n| 操作 | 仅 `cardExpireAt += N` 或延为永久 |\n| 无折扣权益 | 免费，`feeAmount=0` |\n| 有折扣权益 | 可收费；默认可：`折扣分摊购卡价 × 延期天数 ÷ 原有效期`；商家可改/0 |\n| 流水 | 独立延期订单；**不计入办卡总额/次数** |\n| 永久卡 | UI 仍展示延期入口；点击提示「永久卡无需延期」；接口拒绝（`EXTEND_NOT_ALLOWED`） |\n| 不限次 × 永久 | 选「不限次」且卡有效期为永久：弹窗（取消 / 去设置）；不保留不限次；「去设置」回 Step1（不预改有效期）。已有不限次时不可改回永久 |\n\n---\n\n## 3. 退卡总公式（Q4）\n\n\\[\n建议退款 = \\max(0,\\ 办卡实付 - \\sum 消耗价值)\n\\]\n\n- Sheet 可展示 Σ剩余价值，**不得**用其封顶建议退。  \n- 整卡退；确认后失效清零。  \n- 消费顺序：余额先充值后赠送；项目先购买次后赠送次。  \n- 策略读实例快照 `usagePolicySnapshot.refundRule`。\n\n---\n\n## 4. 名义价值池（组合卡共用）\n\n| 权重 | 定义 |\n|------|------|\n| 余额名义 | 充值面值 + 赠送面值 |\n| 项目权重 | 快照挂牌价 × (购次+赠次)；**不限次不计** |\n| 折扣权重 | 快照挂牌价（或全部项目均价口径） |\n| 名义合计 | Σ 权重；作分母 |\n\n---\n\n## 5. 均值模式 `alloc_pool`（退卡界面「均值模式」）\n\n| 线 | 消耗价值 |\n|----|----------|\n| 余额 | 已用充值×(余额分摊/充值面值) + 已用赠送×(余额分摊/总面值) |\n| 项目 | 已用次数 × (该项目分摊实付 / 总次数) |\n| 折扣 | 累计已享优惠 `savedTotal` |\n\n余额分摊实付 = 办卡实付 × (余额名义 / 名义合计)。\n\n---\n\n## 6. 减值模式 `retail`（退卡界面「减值模式」）\n\n| 线 | 消耗价值 |\n|----|----------|\n| 余额 | **同均值** |\n| 项目 | **快照挂牌价 × 已用次数** |\n| 折扣 | **同均值**（已享优惠） |\n\n---\n\n## 7. 折扣档换算\n\n- `tickIndex` ∈ [0, 20]；`20` = 原价  \n- 折后价 = 原价 × `tickIndex / 20`（例：17 → 8.5 折）  \n- `mode=fixed`：折后价 = `amount`  \n- 已享优惠单次 = max(0, 原价 − 折后价)\n\n---\n\n## 8. 锚定算例 A（本期必过单测）\n\n**输入**\n\n- 实付 `paidAmount = 500`  \n- 纯项目：洗剪吹挂牌 `68`；购 8 + 赠 2；已用购买 `2`，赠送未用  \n\n**均值**\n\n| 步骤 | 结果 |\n|------|------|\n| 名义合计 | 68 × 10 = 680 |\n| 分摊实付 | 500 |\n| 单次摊销 | 50 |\n| 消耗 | 50 × 2 = **100** |\n| 建议退 | 500 − 100 = **400** |\n\n**减值**\n\n| 步骤 | 结果 |\n|------|------|\n| 消耗 | 68 × 2 = **136** |\n| 建议退 | 500 − 136 = **364** |\n\n---\n\n## 9. 更多算例\n\n`logic.html` 案例 B–E（组合卡、折扣线、零售池对照等）。后端应用同一套 fixture 做回归；数值以文档更新日引擎为准。\n\n---\n\n## 10. 业绩（Q3）· 本期\n\n- 只持久化 `performanceRule`（界面：均值模式 / **原价模式**）  \n- **不实现**劳动业绩运算；**不纳入**本期验收  \n\n---\n\n## 11. 审计\n\n修改 `actualRefund` ≠ `suggestedRefund` 时必须写审计：操作者、实例 ID、建议值、实际值、时间。\n","04-page-map.md":"# 04 · 原型页面 ↔ 能力 ↔ 接口\n\n原型：[`../demo.html`](../demo.html) · 在线：https://xdean-designer.github.io/card/demo.html  \n\n**图例**：✅ 本期 P0　⏸ 依赖外部/占位　❌ 本期不排（原型仅演示）\n\n---\n\n## 1. 页面对照\n\n| 原型 screen | 页面 | 本期 | 主要接口 |\n|-------------|------|------|----------|\n| `screen0` | 会员卡列表（在售/已下架） | ✅ | `GET /templates` |\n| `screen10` | 创建 Step1 基本信息 | ✅ | （表单态） |\n| `screen9` | 创建 Step2 权益组合 | ✅ | 选项目依赖 `GET /catalog/projects` ⏸ |\n| `screen11` | 创建 Step3 用卡策略 | ✅ | `POST /templates` 保存 |\n| `screen7` | 创建成功 | ✅ | — |\n| `screen6` | 会员卡详情 | ✅ | `GET /templates/{id}` |\n| `screen2` | 添加/编辑项目权益（选项目 + 次数参数） | ✅ | catalog 只读 ⏸ |\n| `screen4` | 添加/编辑折扣权益（选项目 + 折扣参数） | ✅ | catalog 只读 ⏸ |\n| `screen8` | 办卡成功 | ✅ | `POST .../issue` |\n| Sheet：选会员 | 新办 / 退卡延期 | ✅ | members ⏸ · holders · extend · refund |\n| Sheet：退卡估值 | 建议退 / 实退 | ✅ | `refund/preview` · `confirm` |\n| 居中弹窗 | 删除确认、不限次×永久提示等 | ✅ | —（对齐 ModalPopup） |\n| `screen-p-*` | 价目表 | ❌ | 不排本期 |\n| `screen2setup` / `screen4setup` / `screen5` | 旧设置壳（空或弱） | ❌ | 已并入 `screen2` / `screen4` |\n| — | 补录老卡 | P1 | 另立 |\n\n---\n\n## 2. 前端状态要点\n\n| 场景 | 表现 |\n|------|------|\n| `validCardCount > 0` | 详情编辑禁用；提示克隆改规则 |\n| `shelved` | 列表在「已下架」；不可新办；可重新上架/克隆 |\n| Step1 有效期限 | 默认 **永久**；含不限次项目后不可再选永久 |\n| Step2 权益开关 | 右侧 Switch；关闭仅收起展开区，**保留已配数据**（E2） |\n| Step2 结果卡 | 白底阴影卡；标题=项目范围；副文=次数或折扣；整卡可编辑，右侧删除 |\n| 项目范围文案 | 全选在售目录 →「全部项目」；否则全部项目名用 `、` 拼接（可换行，无省略号） |\n| 添加权益确定后 | 回 Step2，**对应开关打开且展开区展开** |\n| 不限次 × 永久 | 弹窗「不限次项目须先设置卡有效期（不可为永久）」；**取消** / **去设置**；不保留不限次；去设置回 Step1（不预改） |\n| 选择项目 | 展示「已选 N 项」；至少 1 项才能确定 |\n| Step3 用卡策略 | 退卡：均值 / 减值；业绩：均值 / 原价；各一行公式提示；SVG radio |\n| 永久卡 | 退卡/延期列表仍展示「延期」；点击 toast「永久卡无需延期」，不展开面板 |\n| 含折扣延期 | 展示费用，可改/0 |\n| 退卡 Sheet | 剩余上、消耗下；策略角标均值/减值 |\n| 实退改写 | 允许；提交走审计 |\n| 步骤条间距 | Step2 步骤条与内容卡间距 **16px** |\n\n---\n\n## 3. 前端不接本期\n\n- 价目 CRUD、置顶、绑卡锁定 UI、预约开关联调  \n- 业绩计算结果展示  \n- 部分退入口  \n\n---\n\n## 4. 与 PRD 可视化\n\n范围投屏：[`../prd-review.html`](../prd-review.html)\n","05-acceptance.md":"# 05 · 本期 P0 验收清单\n\n范围依据：[`00-scope.md`](./00-scope.md)。不通过则不可标「本期完成」。\n\n---\n\n## A. 模板\n\n- [ ] 可创建含面值+项目+折扣的组合卡，并保存 `usagePolicy` 四组合之一（退卡均值/减值 × 业绩均值/原价）  \n- [ ] Step2：开关展开配置；结果卡展示全部项目名或「全部项目」；添加权益确定后对应区块保持展开  \n- [ ] 列表区分在售 / 已下架；下架后不可新办  \n- [ ] 重新上架后可再办  \n- [ ] `validCardCount > 0` 时不可改 Step1–3；接口返回锁定错误  \n- [ ] 克隆生成新模板，源模板不强制下架  \n\n## B. 办卡\n\n- [ ] 选择既存会员 + 支付成功后生成实例  \n- [ ] 实例含策略快照、挂牌价快照、初始 ledger、到期日（非永久）  \n- [ ] 面值不因卡到期而清除  \n\n## C. 延期\n\n- [ ] 仅延长 `cardExpireAt`；失效卡可复活  \n- [ ] 无折扣免费；有折扣可收费用且流水不计入办卡统计  \n- [ ] 永久卡展示延期入口；点击 toast「永久卡无需延期」；接口拒绝  \n- [ ] 卡有效期为永久时选「不限次」：弹窗（取消 / 去设置），不保留不限次；「去设置」回 Step1 且不预改有效期  \n\n## D. 退卡\n\n- [ ] 试算：算例 A 均值建议退 **400**、减值 **364**（见 `03-rules-cases.md`）  \n- [ ] `suggested = max(0, 实付 − Σ消耗)`，不以剩余封顶  \n- [ ] 确认后实例退卡、权益清零；支持改实退并写审计  \n- [ ] 无部分退能力  \n\n## E. 非功能 / 边界\n\n- [ ] 缺挂牌价或 ledger 不完整时有明确错误码（可配置拦截）  \n- [ ] 本期**不验收**：价目管理、会员管理、补录、业绩运算、预约联调  \n\n## F. 文档签署\n\n- [ ] 前后端确认 `01` 字段映射表  \n- [ ] 确认 `02` 路径可按中台改名但语义不变  \n- [ ] QA 持有算例 A（及计划回归的 B–E）fixture  \n\n---\n\n**不在清单内的原型功能**，即使演示可点，也不作为本期退出条件。\n"}</script>
<script>
(function () {
  const DOCS = {
    home: { title: '总览', file: 'README.md' },
    '00-scope.md': { title: '00 · 范围一页纸', file: '00-scope.md' },
    '01-data-model.md': { title: '01 · 领域数据模型', file: '01-data-model.md' },
    '02-api-catalog.md': { title: '02 · 接口目录草案', file: '02-api-catalog.md' },
    '03-rules-cases.md': { title: '03 · 规则与验收算例', file: '03-rules-cases.md' },
    '04-page-map.md': { title: '04 · 页面对照', file: '04-page-map.md' },
    '05-acceptance.md': { title: '05 · 验收清单', file: '05-acceptance.md' },
  };

  try {
    window.__DOCS_BUNDLE__ = JSON.parse(document.getElementById('docs-bundle').textContent);
  } catch (e) {
    window.__DOCS_BUNDLE__ = {};
    console.error('docs bundle parse failed', e);
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function rewriteHref(href) {
    let h = href;
    // ./00-scope.md -> #00-scope
    if (/^\.\/[\w.-]+\.md$/.test(h)) {
      return '#' + h.slice(2).replace(/\.md$/, '');
    }
    // ./index.html#00-scope or index.html#00-scope -> #00-scope
    const m = h.match(/^(?:\.\/)?index\.html#(home|[\w.-]+)$/);
    if (m) return '#' + m[1];
    return h;
  }

  function inlineFormat(text) {
    let s = escapeHtml(text);
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, href) => {
      const h = rewriteHref(href);
      return '<a href="' + escapeHtml(h) + '">' + label + '</a>';
    });
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\\\(/g, '(').replace(/\\\)/g, ')');
    s = s.replace(/\\\[/g, '[').replace(/\\\]/g, ']');
    return s;
  }

  function splitTableCells(line) {
    const raw = line.replace(/^\|/, '').replace(/\|$/, '');
    const cells = [];
    let cur = '';
    for (let i = 0; i < raw.length; i++) {
      if (raw[i] === '\\' && raw[i + 1] === '|') {
        cur += '|';
        i++;
      } else if (raw[i] === '|') {
        cells.push(cur.trim());
        cur = '';
      } else {
        cur += raw[i];
      }
    }
    cells.push(cur.trim());
    return cells;
  }

  function renderMarkdown(src) {
    const lines = String(src).replace(/\r\n/g, '\n').split('\n');
    const out = [];
    let i = 0;
    let inCode = false;
    let codeBuf = [];
    let listType = null;

    function closeList() {
      if (!listType) return;
      out.push(listType === 'ul' ? '</ul>' : '</ol>');
      listType = null;
    }
    function flushCode() {
      out.push('<pre><code>' + escapeHtml(codeBuf.join('\n')) + '</code></pre>');
      codeBuf = [];
      inCode = false;
    }

    while (i < lines.length) {
      const line = lines[i];
      if (line.startsWith('```')) {
        if (inCode) flushCode();
        else { closeList(); inCode = true; codeBuf = []; }
        i++; continue;
      }
      if (inCode) { codeBuf.push(line); i++; continue; }

      if (/^\|/.test(line) && i + 1 < lines.length && /^\|?\s*-/.test(lines[i + 1])) {
        closeList();
        const rows = [];
        while (i < lines.length && /^\|/.test(lines[i])) {
          const cells = splitTableCells(lines[i]);
          if (!/^[\s:-]+$/.test(cells.join(''))) rows.push(cells);
          i++;
        }
        if (rows.length) {
          out.push('<table><thead><tr>' + rows[0].map(c => '<th>' + inlineFormat(c) + '</th>').join('') + '</tr></thead><tbody>');
          rows.slice(1).forEach(r => {
            out.push('<tr>' + r.map(c => '<td>' + inlineFormat(c) + '</td>').join('') + '</tr>');
          });
          out.push('</tbody></table>');
        }
        continue;
      }

      if (/^---+$/.test(line.trim())) { closeList(); out.push('<hr />'); i++; continue; }

      const h = line.match(/^(#{1,3})\s+(.*)$/);
      if (h) {
        closeList();
        const lv = h[1].length;
        out.push('<h' + lv + '>' + inlineFormat(h[2]) + '</h' + lv + '>');
        i++; continue;
      }

      if (/^>\s?/.test(line)) {
        closeList();
        const parts = [];
        while (i < lines.length && /^>\s?/.test(lines[i])) {
          parts.push(lines[i].replace(/^>\s?/, ''));
          i++;
        }
        out.push('<blockquote><p>' + inlineFormat(parts.join(' ')) + '</p></blockquote>');
        continue;
      }

      const ul = line.match(/^[-*]\s+(.*)$/);
      if (ul) {
        if (listType !== 'ul') { closeList(); out.push('<ul>'); listType = 'ul'; }
        out.push('<li>' + inlineFormat(ul[1]) + '</li>');
        i++; continue;
      }
      const ol = line.match(/^\d+\.\s+(.*)$/);
      if (ol) {
        if (listType !== 'ol') { closeList(); out.push('<ol>'); listType = 'ol'; }
        out.push('<li>' + inlineFormat(ol[1]) + '</li>');
        i++; continue;
      }

      if (!line.trim()) { closeList(); i++; continue; }
      closeList();
      out.push('<p>' + inlineFormat(line) + '</p>');
      i++;
    }
    closeList();
    if (inCode) flushCode();
    return out.join('\n');
  }

  function currentKey() {
    const hash = (location.hash || '#home').slice(1);
    if (hash === 'home' || !hash) return 'home';
    if (DOCS[hash + '.md']) return hash + '.md';
    if (DOCS[hash]) return hash;
    return 'home';
  }

  function navigateTo(hash) {
    const next = (hash || 'home').replace(/^#/, '');
    if (location.hash.slice(1) === next) {
      loadDoc();
    } else {
      location.hash = next;
    }
  }

  async function loadDoc() {
    const key = currentKey();
    const meta = DOCS[key] || DOCS.home;
    document.getElementById('pageTitle').textContent = meta.title;
    document.querySelectorAll('.nav a.doc').forEach(a => {
      a.classList.toggle('is-on', a.dataset.doc === key || (key === 'home' && a.dataset.doc === 'home'));
    });
    const el = document.getElementById('content');
    el.className = 'article md loading';
    el.textContent = '加载中…';
    try {
      let text = (window.__DOCS_BUNDLE__ && window.__DOCS_BUNDLE__[meta.file]) || null;
      if (!text) {
        const res = await fetch(meta.file, { cache: 'no-cache' });
        if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
        text = await res.text();
      }
      el.className = 'article md';
      el.innerHTML = renderMarkdown(text);
      el.querySelectorAll('a[href^="#"]').forEach(a => {
        a.addEventListener('click', (ev) => {
          const href = a.getAttribute('href') || '';
          if (href.startsWith('#') && href.length > 1) {
            ev.preventDefault();
            navigateTo(href.slice(1));
          }
        });
      });
      window.scrollTo(0, 0);
    } catch (err) {
      el.className = 'article error';
      el.innerHTML = '<p>无法加载 <code>' + escapeHtml(meta.file) + '</code>。</p>' +
        '<p>' + escapeHtml(String(err.message || err)) + '</p>' +
        '<p>请使用本地 HTTP 服务或 GitHub Pages 打开（不要用 file://）。</p>';
    }
  }

  document.querySelectorAll('.nav a.doc').forEach(a => {
    a.addEventListener('click', (ev) => {
      const href = a.getAttribute('href') || '';
      if (!href.startsWith('#')) return;
      ev.preventDefault();
      navigateTo(href.slice(1) || 'home');
    });
  });

  window.addEventListener('hashchange', loadDoc);
  loadDoc();
})();
</script>

</body>
